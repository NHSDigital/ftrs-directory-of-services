<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-labelledby="title desc">
  <title id="title">Performance & Observability Flow</title>
  <desc id="desc">Operation to expectation entry to structured telemetry to validator to dashboard taxonomy to breach handling. PERF-001 baseline delegates thresholds to registry for agility.</desc>
  <style>
    .box { fill:#0B5FFF; stroke:#033E99; stroke-width:2; rx:12; ry:12; }
    .box2 { fill:#007A5A; stroke:#00573F; stroke-width:2; rx:12; ry:12; }
    .box3 { fill:#6A00A8; stroke:#470070; stroke-width:2; rx:12; ry:12; }
    .box4 { fill:#C95E00; stroke:#8F4300; stroke-width:2; rx:12; ry:12; }
    .box5 { fill:#BD004B; stroke:#7E0033; stroke-width:2; rx:12; ry:12; }
    .note { fill:#F5F7FA; stroke:#8BA1B7; stroke-width:1.5; rx:10; ry:10; }
    text { font-family: "Helvetica Neue", Arial, sans-serif; fill:#ffffff; font-size:18px; line-height:1.3; }
    .small { font-size:14px; }
    .dark { fill:#182433; }
    .arrow { stroke:#182433; stroke-width:3; marker-end:url(#arrowhead); }
    .label { font-size:16px; fill:#182433; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#182433" />
    </marker>
  </defs>

  <!-- Boxes Row -->
  <rect x="20" y="60" width="250" height="120" class="box" />
  <rect x="300" y="60" width="250" height="120" class="box2" />
  <rect x="580" y="60" width="300" height="120" class="box3" />
  <rect x="910" y="60" width="300" height="120" class="box4" />
  <rect x="1240" y="60" width="340" height="120" class="box5" />

  <!-- Text in boxes -->
  <text x="35" y="95">Operation</text>
  <text x="35" y="125" class="small">Endpoint / job / FHIR op</text>

  <text x="315" y="95">Expectation Entry</text>
  <text x="315" y="125" class="small">p50 / p95 / max + rationale</text>

  <text x="595" y="90">Deployment Emits</text>
  <text x="595" y="115" class="small">Structured Log + Metrics + Trace</text>
  <text x="595" y="140" class="small">Correlation IDs / dimensions</text>

  <text x="925" y="90">Validator Asserts</text>
  <text x="925" y="115" class="small">Compare live latency vs targets</text>
  <text x="925" y="140" class="small">Fail fast in CI / nightly</text>

  <text x="1255" y="90">Dashboard & Taxonomy</text>
  <text x="1255" y="115" class="small">Trend, Percentiles, Error buckets</text>
  <text x="1255" y="140" class="small">Actionable + drill-down</text>

  <!-- Arrows -->
  <line x1="270" y1="120" x2="300" y2="120" class="arrow" />
  <line x1="550" y1="120" x2="580" y2="120" class="arrow" />
  <line x1="880" y1="120" x2="910" y2="120" class="arrow" />
  <line x1="1210" y1="120" x2="1240" y2="120" class="arrow" />

  <!-- Breach path -->
  <path d="M 1390 180 C 1390 250 1200 250 1200 310" fill="none" stroke="#BD004B" stroke-width="3" marker-end="url(#arrowhead)" />
  <text x="1210" y="330" class="label">Breach ⇒ Story / Alert / Escalation</text>

  <!-- PERF-001 Baseline Note -->
  <rect x="20" y="250" width="670" height="120" class="note" />
  <text x="40" y="280" class="dark">PERF-001 Baseline</text>
  <text x="40" y="305" class="dark small">Delegates concrete thresholds to registry (expectations.yaml)</text>
  <text x="40" y="330" class="dark small">Allows agile target evolution without NFR re-approval</text>
  <text x="40" y="355" class="dark small">Governance: atomic changes tracked via Conventional Commits</text>

  <!-- Legend -->
  <rect x="730" y="250" width="530" height="120" class="note" />
  <text x="750" y="280" class="dark">Legend</text>
  <text x="750" y="305" class="dark small">Blue: Source Operation</text>
  <text x="750" y="325" class="dark small">Green: Declarative Target (registry)</text>
  <text x="750" y="345" class="dark small">Purple: Telemetry Emission</text>
  <text x="750" y="365" class="dark small">Orange: Validation Stage</text>
  <text x="1050" y="305" class="dark small">Pink: Insights & Actions</text>

</svg>
