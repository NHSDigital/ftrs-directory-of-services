name: Build and upload code coverage report
on:
  workflow_call:
    inputs:
      environment:
        description: "The deployment environment"
        required: true
        type: string

jobs:
  build-coverage-report:
    name: "Build collated code coverage report"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests/coverage
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v4

      - name: "Install asdf"
        uses: asdf-vm/actions/setup@v3.0.2
        with:
          asdf_branch: v0.15.0

      - name: "Cache asdf tools"
        id: asdf-cache
        uses: actions/cache@v4
        with:
          path: ~/.asdf
          key: asdf-${{ runner.os }}-${{ hashFiles('.tool-versions') }}

      - name: "Install tools from .tool-versions"
        if: steps.asdf-cache.outputs.cache-hit != 'true'
        uses: asdf-vm/actions/install@v3.0.2

      - name: "Configure AWS Credentials"
        uses: ./.github/actions/configure-credentials
        with:
          aws_account_id: ${{ secrets.ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          multi_domain: false

      - name: "Install project"
        run: make install
        # working-directory: tests/coverage

      - name: "Download code coverage reports"
        uses: actions/download-artifact@v4
        with:
          name: .crud-apis-coverage
          path: tests/coverage/.crud-apis-coverage

      - name: "Compile code coverage report"
        run:  make combine-coverage
        # working-directory: tests/coverage

      - name: "Publish collated code coverage report to GitHub"
        uses: actions/upload-artifact@v4.6.1
        with:
          name: .coverage
          path: tests/coverage/.coverage
          if-no-files-found: error
          include-hidden-files: true
