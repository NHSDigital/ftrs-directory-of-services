name: APIM Proxygen Authentication

permissions:
  id-token: write
  contents: read
on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment to authenticate against (e.g., dev, internal-dev-sandbox, sandbox, test, prod)'
        required: true
        type: string
      api_name:
        description: 'Name of the API to access via Proxygen'
        required: true
        type: string
    outputs:
      access_token:
        description: 'Short-lived access token for Proxygen API'
        value: ${{ jobs.get-access-token.outputs.token }}

jobs:
  get-access-token:
    name: Retrieve APIM Access Token
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      token: ${{ steps.get-token.outputs.access_token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-credentials
        with:
          aws_account_id: ${{ secrets.ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          type: app

      - name: Get APIM Access Token
        id: get-token
        uses: ./.github/actions/authenticate-apim
        with:
          api_name: ${{ inputs.api_name }}
          environment: ${{ inputs.environment }}
          aws_region: ${{ vars.AWS_REGION }}

      - name: Sanity check token (optional)
        env:
          ACCESS_TOKEN: ${{ steps.get-token.outputs.access_token }}
          API_NAME: ${{ inputs.api_name }}
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "No access token to test" >&2
            exit 1
          fi
          curl --fail --silent --show-error \
            --request GET \
            --url https://proxygen.prod.api.platform.nhs.uk/apis/${API_NAME} \
            --header "Authorization: Bearer $ACCESS_TOKEN" >/dev/null
