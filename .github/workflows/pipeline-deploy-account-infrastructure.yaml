name: Deploy Account Level Infrastructure Pipeline

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - "main"
      - "task/**"
    paths:
      - "infrastructure/stacks/account_wide/**"
      - "infrastructure/stacks/terraform_management/**"
      - "infrastructure/stacks/artefact_management/**"
      - "infrastructure/stacks/domain_name/**"
      - "infrastructure/stacks/account_security/**"
      - "infrastructure/stacks/aws_backup_destination/**"
      - "infrastructure/stacks/aws_backup_source/**"
      - "infrastructure/stacks/slack_notifier/**"
      - "infrastructure/modules/dynamodb/**"
      - "infrastructure/modules/aws-backup-destination/**"
      - "infrastructure/modules/aws-backup-source/**"
      - "infrastructure/modules/s3/**"
      - "infrastructure/modules/shield/**"
  workflow_run:
    workflows: ["Pipeline Deploy Policies Infrastructure"]
    types:
      - completed
  workflow_dispatch:
    # checkov:skip=CKV_GHA_7:Inputs reviewed and approved
    inputs:
      ref:
        description: "Specify the branch, tag or SHA to be used for deployment"
        required: false
        type: string
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - int
          - ref
          - prod
  workflow_call:
    inputs:
      ref:
        description: "Specify the branch, tag or SHA to be used for deployment"
        required: false
        type: string
      environment:
        description: "Deployment environment"
        required: true
        type: string
    outputs:
      ui_enabled:
        description: "Whether UI stack is enabled"
        value: ${{ jobs.check-stack-toggles.outputs.ui_enabled }}
      read_only_viewer_enabled:
        description: "Whether read-only-viewer stack is enabled"
        value: ${{ jobs.check-stack-toggles.outputs.read_only_viewer_enabled }}
    secrets:
      ACCOUNT_ID:
        description: "AWS account ID for credentials"
        required: true
      MGMT_ACCOUNT_ID:
        description: "Management AWS account ID for credentials"
        required: true
      OIDC_THUMBPRINT:
        description: "GitHub Actions OIDC provider thumbprint"
        required: false
      IDP_AWS_REPORT_UPLOAD_ACCOUNT_ID:
        description: "Report upload AWS account ID"
        required: false
      IDP_AWS_REPORT_UPLOAD_REGION:
        description: "Report upload AWS region"
        required: false
      IDP_AWS_REPORT_UPLOAD_ROLE_NAME:
        description: "Report upload role name"
        required: false
      IDP_AWS_REPORT_UPLOAD_BUCKET_ENDPOINT:
        description: "Report upload bucket endpoint"
        required: false
      SLACK_WEBHOOK_PIPELINE_URL:
        description: "Slack webhook URL"
        required: false
      SLACK_WEBHOOK_ALARMS_URL:
        description: "Slack webhook URL for CloudWatch alarm notifications"
        required: false
      SPLUNK_COLLECTOR_URL:
        description: "The base url for splunk collector"
        required: true
      SPLUNK_HEC_ENDPOINT:
        description: "The HEC endpoint for splunk"
        required: true
      SPLUNK_HEC_TOKEN:
        description: "The HEC token for splunk"
        required: true

concurrency:
  group: account-infrastructure-${{ github.ref }}
  cancel-in-progress: false

jobs:
  metadata:
    name: "Get Metadata"
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    uses: ./.github/workflows/metadata.yaml

  quality-checks:
    name: "Quality checks for ${{ needs.metadata.outputs.environment }} deployment"
    needs:
      - metadata
    uses: ./.github/workflows/quality-checks.yaml
    with:
      ref: ${{ inputs.ref }}
      environment: ${{ needs.metadata.outputs.environment }}
      workspace: "default"
      stacks: "['terraform_management','account_wide','artefact_management','domain_name','account_security','slack_notifier','aws_backup_source','aws_backup_destination']"
      type: account
      build_timestamp: ${{ needs.metadata.outputs.build_timestamp }}
      skip_dirs: "services/dos-ui,services/read-only-viewer"
    secrets:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
      IDP_AWS_REPORT_UPLOAD_ACCOUNT_ID: ${{ secrets.IDP_AWS_REPORT_UPLOAD_ACCOUNT_ID }}
      IDP_AWS_REPORT_UPLOAD_REGION: ${{ secrets.IDP_AWS_REPORT_UPLOAD_REGION }}
      IDP_AWS_REPORT_UPLOAD_ROLE_NAME: ${{ secrets.IDP_AWS_REPORT_UPLOAD_ROLE_NAME }}
      IDP_AWS_REPORT_UPLOAD_BUCKET_ENDPOINT: ${{ secrets.IDP_AWS_REPORT_UPLOAD_BUCKET_ENDPOINT }}
      SLACK_WEBHOOK_ALARMS_URL: ${{ secrets.SLACK_WEBHOOK_ALARMS_URL }}
      OIDC_THUMBPRINT: ${{ secrets.OIDC_THUMBPRINT }}
      SPLUNK_COLLECTOR_URL: ${{ secrets.SPLUNK_COLLECTOR_URL }}
      SPLUNK_HEC_ENDPOINT: ${{ secrets.SPLUNK_HEC_ENDPOINT }}
      SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}

  prepare-toggle-artifacts:
    name: "Prepare Toggle artifacts"
    needs:
      - metadata
      - quality-checks
    uses: ./.github/workflows/prepare-toggle-artifacts.yaml
    with:
      environment: ${{ needs.metadata.outputs.environment }}
      workspace: "default"
      ref: ${{ inputs.ref }}

  check-stack-toggles:
    name: "Check stack toggles for ${{ needs.metadata.outputs.environment }}"
    needs:
      - metadata
      - prepare-toggle-artifacts
    uses: ./.github/workflows/check-stack-toggles.yaml
    with:
      environment: ${{ needs.metadata.outputs.environment }}
      workspace: "default"
      ref: ${{ inputs.ref }}

  build-services:
    name: "Build slack-notifier"
    needs:
      - metadata
      - quality-checks
      - check-stack-toggles
    uses: ./.github/workflows/build-project.yaml
    with:
      name: "slack-notifier"
      build_type: "service"
      python_version: ${{ needs.metadata.outputs.python_version }}
      commit_hash: ${{ needs.metadata.outputs.commit_hash }}
      environment: ${{ needs.metadata.outputs.mgmt_environment }}
      repo_name: ${{ needs.metadata.outputs.reponame }}
      workspace: "default"
      type: account
      ref: ${{ inputs.ref }}
      build_enabled: ${{ needs.check-stack-toggles.outputs.slack_notifier_enabled == 'true' }}
    secrets:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}

  # --- Wave 1: run in parallel ---

  deploy-account-security:
    name: "Deploy account security infrastructure"
    needs:
      - metadata
      - quality-checks
      - check-stack-toggles
      - build-services
    uses: ./.github/workflows/deploy-account-infrastructure.yaml
    with:
      environment: ${{ needs.metadata.outputs.account_type }}
      stacks: "['account_security']"
      download_appconfig_artifact: false
      ref: ${{ inputs.ref }}
    secrets:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
      OIDC_THUMBPRINT: ${{ secrets.OIDC_THUMBPRINT }}
      SLACK_WEBHOOK_ALARMS_URL: ${{ secrets.SLACK_WEBHOOK_ALARMS_URL }}
      SPLUNK_COLLECTOR_URL: ${{ secrets.SPLUNK_COLLECTOR_URL }}
      SPLUNK_HEC_ENDPOINT: ${{ secrets.SPLUNK_HEC_ENDPOINT }}
      SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}

  deploy-env-infrastructure:
    name: "Deploy env infrastructure"
    needs:
      - metadata
      - quality-checks
      - check-stack-toggles
      - build-services
    uses: ./.github/workflows/deploy-account-infrastructure.yaml
    with:
      environment: ${{ needs.metadata.outputs.environment }}
      stacks: "['terraform_management','account_wide','domain_name','slack_notifier','aws_backup_source']"
      download_appconfig_artifact: true
      ref: ${{ inputs.ref }}
    secrets:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
      SLACK_WEBHOOK_ALARMS_URL: ${{ secrets.SLACK_WEBHOOK_ALARMS_URL }}
      SPLUNK_COLLECTOR_URL: ${{ secrets.SPLUNK_COLLECTOR_URL }}
      SPLUNK_HEC_ENDPOINT: ${{ secrets.SPLUNK_HEC_ENDPOINT }}
      SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}

  deploy-mgmt-infrastructure:
    name: "Deploy mgmt infrastructure"
    needs:
      - metadata
      - quality-checks
      - check-stack-toggles
      - build-services
    uses: ./.github/workflows/deploy-account-infrastructure.yaml
    with:
      environment: ${{ needs.metadata.outputs.mgmt_environment }}
      stacks: "['terraform_management','account_security','artefact_management','domain_name','aws_backup_destination']"
      download_appconfig_artifact: false
      ref: ${{ inputs.ref }}
    secrets:
      ACCOUNT_ID: ${{ secrets.ACCOUNT_ID }}
      MGMT_ACCOUNT_ID: ${{ secrets.MGMT_ACCOUNT_ID }}
      SLACK_WEBHOOK_ALARMS_URL: ${{ secrets.SLACK_WEBHOOK_ALARMS_URL }}
      SPLUNK_COLLECTOR_URL: ${{ secrets.SPLUNK_COLLECTOR_URL }}
      SPLUNK_HEC_ENDPOINT: ${{ secrets.SPLUNK_HEC_ENDPOINT }}
      SPLUNK_HEC_TOKEN: ${{ secrets.SPLUNK_HEC_TOKEN }}

  # --- Wave 2: run sequentially after wave 1 ---
  # Add further deploy-account-infrastructure calls here with:
  #   needs: [deploy-account-security, deploy-env-infrastructure, deploy-mgmt-infrastructure]
  # Each additional call after that simply needs the previous one.

  slack-notifications:
    name: "Send Notification to Slack"
    needs:
      - metadata
      - quality-checks
      - deploy-account-security
      - deploy-env-infrastructure
      - deploy-mgmt-infrastructure
    if: always()
    uses: ./.github/workflows/slack-notifications.yaml
    with:
      env: ${{ needs.metadata.outputs.environment }}
    secrets:
      SLACK_WEBHOOK_PIPELINE_URL: ${{ secrets.SLACK_WEBHOOK_PIPELINE_URL }}
