name: Promote artefacts workflow
run-name: "Promote ${{ inputs.artefact_promotion_type }} artefacts ${{ inputs.release_tag || inputs.prerelease_tag }}"

permissions:
  id-token: write
  contents: write
on:
  workflow_call:
    inputs:
      workspace:
        description: "The name of the workspace to deploy the application into"
        required: false
        type: string # TEMP
      environment:
        description: "The deployment environment"
        required: false
        type: string
        default: "mgmt"
      repo_name:
        description: "The name of the Git repo"
        required: true
        type: string
      artefact_promotion_type:
        description: "The type of artefact promotion to perform"
        required: true
        type: string
      type:
        description: "The type of permissions (e.g., account, app)"
        required: true
        type: string
      release_tag:
        description: "The release tag for the artefact"
        required: false
        type: string
      prerelease_tag:
        description: "The prerelease tag for the artefact"
        required: false
        type: string

jobs:
  promote-artefacts:
    name: "Promote ${{ inputs.artefact_promotion_type }} artefacts ${{ inputs.release_tag || inputs.prerelease_tag }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: "Checkout code"
        uses: actions/checkout@v6

      - name: "Configure AWS Credentials"
        uses: ./.github/actions/configure-credentials
        with:
          aws_account_id: ${{ secrets.ACCOUNT_ID }}
          aws_region: ${{ vars.AWS_REGION }}
          type: ${{ inputs.type }}
          environment: ${{ inputs.environment }}

      - name: "Promote ${{ inputs.artefact_promotion_type }} artefacts ${{ inputs.release_tag || inputs.prerelease_tag }}"
        run: make -f artefact-promotion.mk ${{ inputs.artefact_promotion_type }}
        working-directory: scripts/services
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          REPO_NAME: ${{ inputs.repo_name }}
          RELEASE_TAG: ${{ inputs.release_tag }}
          PRERELEASE_TAG: ${{ inputs.prerelease_tag }}
          WORKSPACE: ${{ inputs.workspace }} # TEMP

      - name: "Derive clean release version"
        if: ${{ inputs.artefact_promotion_type == 'release' }}
        id: clean_version
        run: |
          echo "clean=$(echo '${{ inputs.release_tag }}' | sed 's/-rc\.[0-9]*$//')" >> $GITHUB_OUTPUT

      - name: "Generate release notes"
        if: ${{ inputs.artefact_promotion_type == 'release' }}
        id: release_notes
        run: |
          git fetch origin main
          git log --pretty=format:"- %h %s" origin/main...HEAD > release_notes.txt
          {
            echo "notes<<EOF"
            cat release_notes.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: "Create GitHub Release"
        if: ${{ inputs.artefact_promotion_type == 'release' }}
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.clean_version.outputs.clean }}
          release_name: "Release ${{ steps.clean_version.outputs.clean }}"
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false