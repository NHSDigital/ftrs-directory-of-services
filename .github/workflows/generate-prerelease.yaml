name: Prerelease Tag Automation

permissions:
  id-token: write
  contents: write

on:
  workflow_call: {}

jobs:
  generate-prerelease:
    name: "Prerelease Tag Automation"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout code"
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: "Fetch tags"
        run: git fetch --tags

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: "Install semantic-release and required plugins"
        run: npm install -g semantic-release @semantic-release/github @semantic-release/git @semantic-release/exec @semantic-release/commit-analyzer @semantic-release/release-notes-generator conventional-changelog-conventionalcommits

      - name: "Generate prerelease"
        run: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Semantic Release
        uses: go-semantic-release/action@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
