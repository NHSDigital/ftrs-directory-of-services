on: [push]

jobs:
  wiki-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 2

      - name: Get modified files
        run: echo "MODIFIED_FILES=$(git diff HEAD^ --name-only | tr '\n' '|')" >> $GITHUB_ENV

      - name: Wiki Sync
        uses: talkiq/confluence-wiki-sync@v1
        with:
          wiki-base-url: ${{ secrets.CONFLUENCE_BASE_URL }}
          user: ${{ secrets.ATLASSIAN_USERNAME }}
          token: ${{ secrets.ATLASSIAN_API_TOKEN }}
          modified-files: docs/nfrs/**
          space-name: FRS
          root-page-title: Non+Functional+Requirements+Operational+Requirements