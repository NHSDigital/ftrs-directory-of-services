name: NFR YAML Validation

permissions:
  id-token: write
  contents: read

on:
  pull_request:
    paths:
      - 'requirements/nfrs/**'
      - 'scripts/nfr/validate_nfrs_yaml.py'
      - 'requirements/nfrs/schemas/nfrs.schema.json'
  workflow_dispatch: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema pyyaml

      - name: Validate NFR YAML files
        run: |
          python scripts/nfr/validate_nfrs_yaml.py

