schemaVersion: '0.3'
description: Promote an AWSPENDING version to AWSCURRENT for an mTLS secret.
assumeRole: '{{ AutomationAssumeRole }}'

parameters:
  AutomationAssumeRole:
    type: String
  SecretId:
    type: String

mainSteps:
  - name: list_versions
    action: aws:executeAwsApi
    outputs:
      - Name: Versions
        Selector: $.Versions
        Type: String
    inputs:
      Service: secretsmanager
      Api: ListSecretVersionIds
      SecretId: '{{ SecretId }}'

  - name: select_versions
    action: aws:executeScript
    outputs:
      - Name: PendingVersionId
        Selector: $.Payload.pending_version_id
        Type: String
      - Name: CurrentVersionId
        Selector: $.Payload.current_version_id
        Type: String
    inputs:
      Runtime: python3.8
      Handler: handler
      InputPayload:
        versions: '{{ list_versions.Versions }}'
      Script: |-
        import json

        def handler(event, _context):
            versions = event.get("versions", [])
            if isinstance(versions, str):
                try:
                    versions = json.loads(versions)
                except json.JSONDecodeError:
                    versions = []

            pending = None
            current = None

            for version in versions:
                stages = version.get("VersionStages", [])
                if "AWSPENDING" in stages:
                    pending = version.get("VersionId")
                if "AWSCURRENT" in stages:
                    current = version.get("VersionId")

            if not pending:
                raise ValueError("No AWSPENDING version found")

            return {
                "pending_version_id": pending,
                "current_version_id": current or ""
            }

  - name: choose_promotion_path
    action: aws:branch
    inputs:
      Choices:
        - Variable: '{{ select_versions.CurrentVersionId }}'
          StringEquals: ''
          NextStep: promote_without_remove
      Default: promote_with_remove

  - name: promote_with_remove
    action: aws:executeAwsApi
    inputs:
      Service: secretsmanager
      Api: UpdateSecretVersionStage
      SecretId: '{{ SecretId }}'
      VersionStage: AWSCURRENT
      MoveToVersionId: '{{ select_versions.PendingVersionId }}'
      RemoveFromVersionId: '{{ select_versions.CurrentVersionId }}'

  - name: promote_without_remove
    action: aws:executeAwsApi
    inputs:
      Service: secretsmanager
      Api: UpdateSecretVersionStage
      SecretId: '{{ SecretId }}'
      VersionStage: AWSCURRENT
      MoveToVersionId: '{{ select_versions.PendingVersionId }}'
