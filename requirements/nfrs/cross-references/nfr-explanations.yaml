  SEC-005: "Strict environment isolation: data access from one environment to another is prevented."
  SEC-006: "No direct production console queries by engineers outside approved, audited break-glass processes."
  SEC-007: "Network security groups allow only narrowly scoped inbound rules; broad ingress is denied."
  SEC-008: "Perimeter scans show secure transport, no open broad whitelists, and hardened edge configuration."
  SEC-009: "Automated ASVS and CIS benchmark scans meet pass thresholds; failures trigger remediation."
  SEC-010: "Annual penetration test completed; identified issues tracked and closed."
  SEC-011: "Enabling security controls does not push latency beyond defined SLAs."
  SEC-012: "IAM roles and policies grant least privilege; periodic reviews confirm minimal access."
  SEC-013: "Cryptographic keys rotate on schedule and unauthorized access attempts are rejected and logged."
  SEC-014: "Mutual TLS (mTLS) succeeds between designated internal services to protect sensitive flows."
  SEC-015: "Certificate expiry is detected in advance; renewal occurs without downtime."
  SEC-016: "Privileged infrastructure roles require multi-factor authentication (MFA)."
  SEC-017: "No long-lived unmanaged credentials; periodic scans confirm only managed secrets exist."
  SEC-018: "Third-party supplier security attestation is collected and stored for audit."
  SEC-019: "Tenant or data segmentation tests confirm isolation boundaries hold."
  SEC-020: "Remote connections present valid certificates from trusted authorities."
  SEC-021: "Port scans reveal only approved diagnostic and service ports—no unexpected exposures."
  SEC-022: "Access to powerful utility programs is restricted to approved roles."
  SEC-023: "Deployment provenance shows traceable unique accounts per automated pipeline stage."
  SEC-024: "Transfer of code or data maintains integrity and uses secure channels; events are logged."
  SEC-025: "Requests containing identifiable patient data enforce mTLS; plaintext attempts are blocked."
