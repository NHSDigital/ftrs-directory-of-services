  SEC-027: "Build pipeline blocks release when critical CVEs exceed threshold; reports archived."
  SEC-028: "Releases are halted if critical unresolved security findings remain."
  SEC-029: "All API endpoints enforce CIS2 JWT authentication with signature, issuer, audience and required assurance claim validation; invalid or missing tokens are rejected with structured errors."
  SEC-030: "Certificates and private keys are stored only in approved encrypted secret stores (e.g., Secrets Manager/KMS) with zero plaintext exposure across repositories, images, logs, or build artifacts; continuous scanning enforces compliance."

