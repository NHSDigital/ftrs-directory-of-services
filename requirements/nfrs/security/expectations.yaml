# Versioned Security Expectations Registry for FtRS
version: 1.0
generated: 2025-11-14

# Each control defines a concrete, automatable expectation mapped to a SEC-* NFR.
# Minimal fields:
# - control_id: stable identifier for the check/control
# - nfr_code: mapped Security NFR code (e.g., SEC-003)
# - measure: short description of what is verified
# - threshold: quantified acceptance level
# - tooling: primary automation used to verify the measure
# - cadence: how often the check runs
# - environments: list of environment identifiers covered by the check
# - status: governance state (draft/accepted/exception)
# - rationale: brief notes supporting the target/tool choice
# Optional fields (not rendered in the summary table): evidence_links, exception_stories

controls:
