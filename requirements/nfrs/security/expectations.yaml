  - control_id: mtls-service-handshake
    nfr_code: SEC-014
    measure: mTLS handshake succeeds between designated services using ITOC-approved CA signed leaf + intermediate certs (chain to ITOC root); invalid/expired/revoked/untrusted-issuer/weak-cipher attempts rejected
    threshold: 100% handshake success for valid ITOC chain; 0 successful handshakes with expired, revoked, weak cipher, or non-ITOC issuer certs; rotation introduces 0 downtime
    tooling: Integration tests (valid/expired/revoked/wrong-CA/weak-cipher) + gateway cert management + OCSP/CRL polling
    cadence: CI per build + cert rotation checks + revocation poll ≤5m
    environments: [int, ref, prod]
    services: [dos-search, crud-apis]
    status: draft
    rationale: Enforces trusted ITOC certificate chain, strong ciphers, timely revocation, and zero-downtime rotation for secure service-to-service trust

