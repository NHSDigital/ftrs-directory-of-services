    nfr_code: SEC-003
    measure: All public/private API endpoints enforce TLS; storage services enable encryption at rest
    threshold: 100% compliant across resources
    tooling: AWS Config rules + Terraform policy checks
    cadence: Continuous (real-time) with CI enforcement on change
    environments: [dev, int, ref, prod]
    services: [crud-apis, dos-ingestion-api, etl-ods, dos-search, read-only-viewer]
    status: draft
    rationale: Aligns with NHS policy; Config provides continuous guardrails; CI blocks drift

