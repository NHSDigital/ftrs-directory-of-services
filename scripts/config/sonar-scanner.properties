# Please DO NOT set the following properties `sonar.organization` and `sonar.projectKey` in this file. They must be stored as `SONAR_ORGANISATION_KEY` and `SONAR_PROJECT_KEY` GitHub secrets.

sonar.host.url=https://sonarcloud.io
sonar.qualitygate.wait=true
sonar.sourceEncoding=UTF-8

# New Code analysis configuration - only fail on issues introduced in current branch
sonar.newCode.referenceBranch=main

# Enhanced analysis configuration  
sonar.scm.provider=git
sonar.scm.forceReloadAll=false

# Quality gate configuration - fail pipeline on new code issues ONLY
sonar.qualitygate.requiredOnlyOnNewCode=true

# Language-specific configurations
sonar.python.version=3.12
sonar.python.coverage.reportPaths=**/coverage-*.xml,coverage.xml,.coverage.xml

# Source and test configuration
sonar.sources=.

# Coverage exclusions - files that don't need coverage but can still be analyzed
sonar.coverage.exclusions=**/*__init__.py,**/*.test.*,**/test_*,tests/**,scripts/**,docs/**,requirements/**,sandbox/**,scans/**,architecture/**,services/read-only-viewer/**,services/dos-ui/**,infrastructure/**,scripts/workflow/create_open_search_index.py,scripts/workflow/populate_open_search_index.py

# Analysis exclusions - files that should not be analyzed at all  
sonar.exclusions=services/read-only-viewer/**,services/dos-ui/**,**/.terraform/**,**/node_modules/**,**/.venv/**,**/__pycache__/**,**/build/**,**/dist/**

